name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # backend-build-and-test is a required status check on main, but it only
  # needs to actually run when backend-affecting files change. Path filters
  # on `on:` would make GitHub Actions skip creating the check entirely for
  # unrelated PRs, which leaves a required check stuck "Expected" forever
  # (see https://github.blog/2021-06-16-handling-skipped-but-required-checks/).
  # Gating with a job-level `if:` instead makes the job report "skipped",
  # which GitHub does count as passing a required check.
  changes:
    name: detect-backend-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        run: |
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -qE '^(backend/|\.github/workflows/backend-ci\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  backend-build-and-test:
    name: backend-build-and-test
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/AdminBackend.slnx

      - name: Build
        run: dotnet build backend/AdminBackend.slnx -c Release --no-restore

      - name: Test (unit + integration)
        # The 80% line-coverage gate for *.Tests projects is configured in
        # backend/Directory.Build.props (Domain + Application scope).
        # *.IntegrationTests projects run WebApplicationFactory +
        # Testcontainers suites against real Postgres (Docker is available
        # on ubuntu-latest runners) and are exempt from the gate - see
        # docs/QUALITY.md.
        run: dotnet test backend/AdminBackend.slnx -c Release --no-build --logger trx
