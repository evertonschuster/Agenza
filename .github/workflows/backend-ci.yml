name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build-and-test:
    name: backend-build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/AdminBackend.slnx

      - name: Build
        run: dotnet build backend/AdminBackend.slnx -c Release --no-restore

      - name: Test (unit + integration)
        # The 80% line-coverage gate for *.Tests projects is configured in
        # backend/Directory.Build.props (Domain + Application scope).
        # *.IntegrationTests projects run WebApplicationFactory +
        # Testcontainers suites against real Postgres (Docker is available
        # on ubuntu-latest runners) and are exempt from the gate - see
        # docs/QUALITY.md.
        run: dotnet test backend/AdminBackend.slnx -c Release --no-build --logger trx
