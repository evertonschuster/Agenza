name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build-and-test:
    name: backend-build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/AdminBackend.slnx

      - name: Build
        run: dotnet build backend/AdminBackend.slnx -c Release --no-restore

      - name: Test with coverage gate (80% line coverage)
        # Scope note: coverlet instruments the assemblies each *.Tests
        # project references - Domain + Application per service. Api and
        # Infrastructure are NOT measured by this gate; they are covered
        # by integration tests once those exist (see docs/QUALITY.md).
        run: >
          dotnet test backend/AdminBackend.slnx -c Release --no-build --logger trx
          -p:CollectCoverage=true -p:Threshold=80 -p:ThresholdType=line -p:ThresholdStat=total
