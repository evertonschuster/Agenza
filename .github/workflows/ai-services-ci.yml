name: AI Services CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'ai-services/**'
      - '.github/workflows/ai-services-ci.yml'
  push:
    branches: [main]
    paths:
      - 'ai-services/**'
      - '.github/workflows/ai-services-ci.yml'

concurrency:
  group: ai-services-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ai-services/assistant-service
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-services/assistant-service/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest
