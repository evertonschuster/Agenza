name: AI Services CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ai-services-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ai-services-build-and-test is a required status check on main, but it only
  # needs to actually run when ai-services-affecting files change. Path
  # filters on `on:` would make GitHub Actions skip creating the check
  # entirely for unrelated PRs, which leaves a required check stuck
  # "Expected" forever (see
  # https://github.blog/2021-06-16-handling-skipped-but-required-checks/).
  # Gating with a job-level `if:` instead makes the job report "skipped",
  # which GitHub does count as passing a required check.
  changes:
    name: detect-ai-services-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        run: |
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -qE '^(ai-services/|\.github/workflows/ai-services-ci\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  ai-services-build-and-test:
    name: ai-services-build-and-test
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ai-services/assistant-service
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-services/assistant-service/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Format check
        run: ruff format --check app tests

      - name: Test (coverage gate configured in pyproject.toml, 80%)
        run: pytest
