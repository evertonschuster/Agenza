name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/admin-frontend/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin-frontend/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-build-and-test:
    name: frontend-build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # package-lock.json was generated on Windows and only pins the win32
        # native binding for @tailwindcss/oxide (and similar optional platform
        # packages). Neither `npm ci` nor `npm install` re-resolves an optional
        # native dependency once *some* platform variant is already pinned in
        # the lock, so both fail here with "Cannot find native binding"
        # (npm/cli#4828). Removing the lockfile forces a full fresh resolve
        # against this runner's actual platform (linux-x64-gnu).
        run: rm -f package-lock.json && npm install

      - name: Format check
        run: npm run format:check --workspace=apps/admin-frontend

      - name: Lint
        run: npm run lint --workspace=apps/admin-frontend

      - name: Typecheck + build
        run: npm run build --workspace=apps/admin-frontend

      - name: Test
        run: npm run test:coverage --workspace=apps/admin-frontend
