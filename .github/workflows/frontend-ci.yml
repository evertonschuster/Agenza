name: Frontend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # frontend-build-and-test is a required status check on main, but it only
  # needs to actually run when frontend-affecting files change. Path filters
  # on `on:` would make GitHub Actions skip creating the check entirely for
  # unrelated PRs, which leaves a required check stuck "Expected" forever
  # (see https://github.blog/2021-06-16-handling-skipped-but-required-checks/).
  # Gating with a job-level `if:` instead makes the job report "skipped",
  # which GitHub does count as passing a required check.
  changes:
    name: detect-frontend-changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        run: |
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" | grep -qE '^(apps/admin-frontend/|package\.json$|package-lock\.json$|\.github/workflows/frontend-ci\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  frontend-build-and-test:
    name: frontend-build-and-test
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        # The lockfile is regenerated in a clean Linux container with no
        # node_modules mounted, which makes npm record EVERY platform's
        # optional native binding (18 variants of @tailwindcss/oxide etc.)
        # with resolved+integrity fields - that sidesteps npm/cli#4828 and
        # lets npm ci work on any OS. If this step ever fails with
        # "Cannot find native binding", regenerate the lock the same way:
        #   docker run --rm -v "$PWD:/w" -w /w node:22 sh -c \
        #     "rm -rf node_modules apps/*/node_modules packages/*/node_modules package-lock.json \
        #      && npm install --package-lock-only --ignore-scripts"
        run: npm ci

      - name: Format check
        run: npm run format:check --workspace=apps/admin-frontend

      - name: Lint
        run: npm run lint --workspace=apps/admin-frontend

      - name: Typecheck + build
        run: npm run build --workspace=apps/admin-frontend

      - name: Test
        run: npm run test:coverage --workspace=apps/admin-frontend
