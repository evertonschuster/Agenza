name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/admin-frontend/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin-frontend/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Not `npm ci`: package-lock.json was generated on Windows and only
        # pins the win32 native binding for @tailwindcss/oxide (and similar
        # optional platform packages). `npm ci` installs strictly from the
        # lockfile and has nothing to install for linux-x64 here, failing
        # with "Cannot find native binding" (npm/cli#4828). `npm install`
        # re-resolves optionalDependencies against the current platform.
        run: npm install

      - name: Format check
        run: npm run format:check --workspace=apps/admin-frontend

      - name: Lint
        run: npm run lint --workspace=apps/admin-frontend

      - name: Typecheck + build
        run: npm run build --workspace=apps/admin-frontend

      - name: Test
        run: npm run test:coverage --workspace=apps/admin-frontend
