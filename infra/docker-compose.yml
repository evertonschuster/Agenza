services:
  admin-frontend:
    build:
      context: ../apps/admin-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5080
      - VITE_OIDC_AUTHORITY=http://localhost:5081
      - VITE_OIDC_CLIENT_ID=admin-panel
      - VITE_OIDC_REDIRECT_URI=http://localhost:5173/callback
      - VITE_OIDC_POST_LOGOUT_REDIRECT_URI=http://localhost:5173/login
      - VITE_OIDC_SCOPE=openid profile tenant_id offline_access
    depends_on:
      - services-service
      - identity-service

  services-service:
    build:
      context: ../backend
      dockerfile: services/services-service/ServicesService.Api/Dockerfile
    ports:
      - "5080:8080"
    environment:
      - ConnectionStrings__Default=Host=services-db;Database=services;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
      - Identity__Authority=http://identity-service:8080
      - Identity__RequireHttpsMetadata=false
    depends_on:
      services-db:
        condition: service_healthy
      identity-service:
        condition: service_started

  services-db:
    image: postgres:16
    environment:
      - POSTGRES_DB=services
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  assistant-service:
    build:
      context: ../ai-services/assistant-service
    ports:
      - "8001:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    environment:
      - IDENTITY_AUTHORITY=http://identity-service:8080
      - IDENTITY_ISSUER=http://localhost:5081/
      - IDENTITY_AUDIENCE=services-api
      - IDENTITY_CLIENT_ID=assistant-service-worker
      - IDENTITY_CLIENT_SECRET=dev-assistant-worker-secret-change-me
      - IDENTITY_SCOPE=services-api
    depends_on:
      - identity-service

  identity-service:
    build:
      context: ../backend
      dockerfile: services/identity-service/IdentityService.Api/Dockerfile
    ports:
      - "5081:8080"
    environment:
      - ConnectionStrings__Default=Host=identity-db;Database=identity;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      identity-db:
        condition: service_healthy

  identity-db:
    image: postgres:16
    environment:
      - POSTGRES_DB=identity
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
