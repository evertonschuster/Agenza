services:
  admin-frontend:
    build:
      context: ../apps/admin-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5080
    depends_on:
      - services-service

  services-service:
    build:
      context: ../backend
      dockerfile: services/services-service/ServicesService.Api/Dockerfile
    ports:
      - "5080:8080"
    environment:
      - ConnectionStrings__Default=Host=services-db;Database=services;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      services-db:
        condition: service_healthy

  services-db:
    image: postgres:16
    environment:
      - POSTGRES_DB=services
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  assistant-service:
    build:
      context: ../ai-services/assistant-service
    ports:
      - "8001:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
